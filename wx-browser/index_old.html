<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MSM 850hPa θe Viewer</title>
<style>
  body {
    font-family: sans-serif;
    margin: 20px;
    text-align: center;
  }

  .slider-area {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-top: 10px;
  }

  /* スライダーの見た目改善 */
  input[type="range"] {
    width: 400px;
    height: 20px;
    -webkit-appearance: none;
    appearance: none;
    background: #ddd;
    border-radius: 10px;
  }

  input[type="range"]::-webkit-slider-runnable-track {
    height: 12px;
    background: #ccc;
    border-radius: 10px;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 24px;
    height: 24px;
    background: #007bff;
    border-radius: 50%;
    cursor: pointer;
    margin-top: -6px;
  }

  input[type="range"]::-moz-range-thumb {
    width: 24px;
    height: 24px;
    background: #007bff;
    border-radius: 50%;
    cursor: pointer;
  }

  .container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
  }

  img {
    width: 48%;
    border: 1px solid #ccc;
  }

  .arrow {
    font-size: 28px;
    cursor: pointer;
    user-select: none;
  }
</style>
</head>
<body>

<h2>MSM 850hPa θe（Barb & Streamline）</h2>

<div class="label">時刻: <span id="labelT">T=00</span></div>

<div class="slider-area">
  <span class="arrow" id="leftBtn">◀</span>
  <input type="range" id="slider" min="0" max="5" value="0">
  <span class="arrow" id="rightBtn">▶</span>
</div>

<div class="container">
  <img id="imgBarb" src="barb/MSM_850hPa_thetae_barb_t0.png">
  <img id="imgStream" src="stream/MSM_850hPa_thetae_stream_t0.png">
</div>

<script>
const hours = [0, 12, 24, 36, 48, 72];
const slider = document.getElementById("slider");

function updateImages() {
    const t = slider.value;
    document.getElementById("labelT").textContent = `T=${hours[t]}`;
    document.getElementById("imgBarb").src = `barb/MSM_850hPa_thetae_barb_t${t}.png`;
    document.getElementById("imgStream").src = `stream/MSM_850hPa_thetae_stream_t${t}.png`;
}

slider.addEventListener("input", updateImages);

document.getElementById("leftBtn").addEventListener("click", () => {
    if (slider.value > 0) slider.value--;
    updateImages();
});

document.getElementById("rightBtn").addEventListener("click", () => {
    if (slider.value < 5) slider.value++;
    updateImages();
});
</script>

</body>
</html>
